# examples/family.conf — a three-slot second row built from complementary
# tmux status providers. Copy the bits you want into your own ~/.tmux.conf.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  left  = LLM usage      center = now playing        right = system stats  │
# └──────────────────────────────────────────────────────────────────────────┘
#
# pillbar itself ships NO palette and NO providers — it only assembles the row.
# Each slot below is a plain tmux format fragment: wrap a command in #(...),
# or drop in an interpolation variable like #{pane_current_path} directly.
#
# ── THE LANDMINE ────────────────────────────────────────────────────────────
# Alignment (#[align=...]) is placed STATICALLY by pillbar. A provider's #(...)
# output must NEVER contain an #[align=...] tag: doing so pins tmux's layout
# engine at 100% CPU. pill.sh is written to obey this — if you write your own
# provider, keep align out of its output too.
#
# ── NON-BLOCKING RULE ───────────────────────────────────────────────────────
# Everything in a #(...) runs on tmux's status refresh. Providers must read a
# cache and return instantly, refreshing in a detached background job when the
# cache is stale (see examples/nowplaying-demo.sh for the exact pattern). A
# provider that shells out to the network on every refresh will stutter tmux.

# ---------------------------------------------------------------------------
# LEFT — LLM usage (e.g. a tmux-llm-usage style provider that writes a cache).
# Substitute the path to whatever your provider script actually is.
set -g @pillbar-left  '#(~/.tmux/plugins/tmux-llm-usage/scripts/render.sh)'

# CENTER — a custom "now playing" capsule shipped with this repo as a demo of
# the cache + detached-refresh discipline. macOS only; prints nothing elsewhere.
set -g @pillbar-center '#(~/.tmux/plugins/tmux-pillbar/examples/nowplaying-demo.sh)'

# RIGHT — system stats. Four values (net / cpu / mem / disk) from a sysmon-style
# provider. Same contract: it reads a cache, never blocks.
set -g @pillbar-right '#(~/.tmux/plugins/tmux-sysmon/scripts/row.sh)'

# ---------------------------------------------------------------------------
# Framework options.

# Background of the whole second row (the gaps between capsules). `default`
# means "the terminal's own background". Give it a colour if you want a band.
set -g @pillbar-bg default

# Capsule style used by pill.sh: nerd | ascii | none.
#   nerd  = rounded half-circle end-caps (needs a Nerd Font)
#   ascii = [ ... ] brackets (works in any font)     ← default
#   none  = bare coloured text, no delimiters
set -g @pillbar-pill-style ascii

# Center alignment: `centre` (default) centres the middle slot in the space
# LEFT OVER between the left and right slots — works on any tmux with a second
# status row. Uncomment the next line ONLY on a newer tmux to instead centre it
# against the FULL width, ignoring the side slots. On a tmux too old to know the
# value, the centre slot collapses to the left — switch back to `centre` if you
# see that.
# set -g @pillbar-center-align absolute-centre
